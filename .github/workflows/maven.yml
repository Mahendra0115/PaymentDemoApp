name: Build Docker & Deploy to EC2 with docker-compose

on:
  push:
    branches: [ main ]   # ya tumhara branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java setup for Maven build (JAR banana)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # JAR build karo (Dockerfile COPY target/... use karega)
      - name: Build JAR with Maven
        run: mvn clean package -DskipTests   # tests skip agar nahi chahiye

      # Docker setup for build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SSH se EC2 pe deploy (no Docker Hub needed)
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3   # latest stable
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e  # error pe stop

            # Repo folder banao ya update karo (agar pehle se nahi hai)
            mkdir -p ~/my-app
            cd ~/my-app

            # Code pull karo (pehle baar clone karna padega manually ya yahan add karo)
            # Agar pehli baar hai toh pehle EC2 pe manually: git clone your-repo-url ~/my-app
            git pull origin main || git clone https://github.com/Mahendra0115/PaymentDemoApp.git .

            # Docker image build (Dockerfile se, JAR copy hoga)
            docker compose down || true

            # MySQL container + app container up (docker-compose.yml use)
            docker compose up -d --build --force-recreate

            # Check status
            docker compose ps
            docker logs my-app_app_1   # app container name check kar lo docker ps se

