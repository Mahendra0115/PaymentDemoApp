name: Build Docker & Deploy to EC2 with docker-compose

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker Buildx setup (multi-stage ke liye better)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SSH se EC2 pe deploy
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Repo folder setup
            mkdir -p ~/my-app
            cd ~/my-app

            # Git pull ya clone (tumhara repo)
            git pull origin main || git clone https://github.com/Mahendra0115/PaymentDemoApp.git .

            # Previous containers stop
            docker compose down || true

            # Build + up (Dockerfile ab Maven build karega)
            docker compose build --no-cache   # --no-cache pehli baar ya force fresh ke liye
            docker compose up -d --force-recreate

            # Status check
            docker compose ps
            docker compose logs --tail=50 app   # app service ke recent logs
