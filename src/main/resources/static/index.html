<!DOCTYPE html>
<html>
<head>
    <title>Razorpay Payment Demo</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body style="font-family: Arial; text-align:center; margin-top:100px;">

    <h2>Simple Payment Gateway Demo</h2>
    <h3>Amount: ₹500</h3>

    <button id="payBtn" style="padding:10px 20px; font-size:16px; cursor:pointer;">
        Pay Now
    </button>

	<script>

	document.getElementById("payBtn").onclick = function () {

	    // Step 1: Create Order from Spring Boot
	    fetch("http://localhost:8080/payment/create-order?amount=500", {
	        method: "POST"
	    })
	    .then(response => response.json())
	    .then(order => {

	        console.log("Order Created:", order);

	        var options = {
	            "key": "rzp_test_SJGOqk1B4bqcdH",   //  Apni Test Key ID
	            "amount": order.amount,
	            "currency": order.currency,
	            "name": "Mahendra Pvt Ltd",
	            "description": "Test Transaction",
	            "order_id": order.id,

	            //  Payment Success Handler
	            "handler": function (response){

	                console.log("Payment Response:", response);
					alert(JSON.stringify(response));
	                // Step 3: Verify payment from backend
	                fetch("http://localhost:8080/payment/verify", {
	                    method: "POST",
	                    headers: {
	                        "Content-Type": "application/x-www-form-urlencoded"
	                    },
						body: new URLSearchParams({
						    razorpay_order_id: response.razorpay_order_id,
						    razorpay_payment_id: response.razorpay_payment_id,
						    razorpay_signature: response.razorpay_signature,
						    amount: order.amount
						})
	                })
	                .then(res => res.text())
	                .then(data => {
	                    alert(data);  // Payment Verified or Failed
	                })
	                .catch(err => {
	                    console.error("Verification Error:", err);
	                    alert("Verification Failed!");
	                });
	            },

	            "prefill": {
	                "name": "Test User",
	                "email": "test@example.com",
	                "contact": "9999999999"
	            },

	            "theme": {
	                "color": "#3399cc"
	            }
	        };

	        var rzp = new Razorpay(options);
	        rzp.open();

	    })
	    .catch(error => {
	        console.error("Order Creation Error:", error);
	        alert("Something went wrong!");
	    });
	};

	</script>

</body>
</html>
